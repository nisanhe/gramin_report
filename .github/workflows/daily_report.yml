name: Garmin Weekly Report

on:
  schedule:
    - cron: '0 21 * * 5' # כל יום ראשון ב-6 בבוקר
  workflow_dispatch: # מאפשר הרצה ידנית

jobs:
  build:
    runs-on: ubuntu-latest
    # הוספת הרשאות כתיבה ל-Repository
    permissions:
      contents: write 
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas numpy garminconnect

      - name: Run Analytics Script
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASS: ${{ secrets.GARMIN_PASS }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add data/garmin_runs.csv
          # הפקודה הבאה תעשה קומיט רק אם יש שינויים (כדי למנוע שגיאה אם לא היו ריצות חדשות)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update running data [skip ci]" && git push)
